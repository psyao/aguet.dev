name: Deploy

# Opt JS actions into Node 24 to avoid deprecation breakage on older action
# runtimes. Revisit once all pinned actions ship native Node 24 support.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# Gated on CI: deploy only fires after the CI workflow completes on main, and the
# build job below short-circuits unless that run went green. Keeps a red test
# suite from shipping.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [ main ]

# Least privilege for GITHUB_TOKEN across every job.
permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # BUILD — runs all untrusted third-party code (composer/pnpm deps, Vite build).
  # Holds no secrets: DOPPLER_TOKEN and DEPLOY_SSH_KEY do NOT exist in this job, so a
  # compromised build dependency cannot reach them.
  # ───────────────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Skip the whole pipeline when CI failed/cancelled — deploy and notify both
    # need build, so they cascade off too.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit      # review the baseline, then switch to block + allowed-endpoints
          # sudo stays enabled here: shivammathur/setup-php needs it to install PHP and
          # system extensions (imagick et al.). Egress monitoring remains the primary
          # guard against a compromised build dependency exfiltrating data.
          disable-sudo: false

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          persist-credentials: false   # don't leave GITHUB_TOKEN on disk for dep code

      - name: Setup environment & build assets
        uses: ./.github/actions/setup-stack

      - name: Package release
        # Ship only deployable paths. vendor/ and node_modules/ are deliberately
        # excluded — vendor/ is rebuilt on the server by deploy.sh; .env is written
        # in the deploy job from Doppler (it must never be in a build artifact).
        run: |
          tar -czf /tmp/release.tar.gz \
            app bootstrap config database lang public resources routes scripts \
            artisan composer.json composer.lock

      - name: Upload release artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release
          path: /tmp/release.tar.gz
          retention-days: 1

  # ───────────────────────────────────────────────────────────────────────────
  # DEPLOY — holds DOPPLER_TOKEN and DEPLOY_SSH_KEY. Runs NO third-party install
  # or build code: it only unpacks the vetted artifact, writes .env, and ships it.
  # ───────────────────────────────────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10
    env:
      DEPLOY_ENV: production
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
      DEPLOY_PHP_BIN: ${{ vars.DEPLOY_PHP_BIN || '/opt/php8.5/bin/php' }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          # Once the baseline is confirmed, switch to block to make exfiltration of
          # the SSH key / Doppler token impossible at the network layer:
          #   egress-policy: block
          #   allowed-endpoints: >
          #     github.com:443
          #     api.github.com:443
          #     objects.githubusercontent.com:443
          #     api.doppler.com:443
          #     ${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PORT || '22' }}
          egress-policy: audit
          disable-sudo: true

      - name: Download release artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release
          path: /tmp/artifact

      - name: Extract release
        run: |
          mkdir -p release
          tar -xzf /tmp/artifact/release.tar.gz -C release

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@4819d808ab99e5cde19a0637a16536a4038fad73 # v4.0.1

      - name: Generate .env
        run: doppler secrets download --no-file --format env > release/.env
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Pinned host key from a secret — NOT a runtime ssh-keyscan (TOFU = MITM window).
          # Capture once locally: ssh-keyscan -p <port> <host>  → paste into DEPLOY_KNOWN_HOSTS.
          echo "${{ secrets.DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Sync files
        run: |
          rsync -rlzc --delete --no-perms --no-owner --no-group --chmod=D755,F644 \
            --include='app/***' \
            --include='bootstrap/***' \
            --include='config/***' \
            --include='database/***' \
            --include='lang/***' \
            --include='public/***' \
            --include='resources/***' \
            --include='routes/***' \
            --include='scripts/***' \
            --include='artisan' \
            --include='composer.json' \
            --include='composer.lock' \
            --include='.env' \
            --exclude='*' \
            -e "ssh -p $DEPLOY_PORT -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes" \
            release/ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/"

      - name: Post-deploy
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -p "$DEPLOY_PORT" -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "bash '$DEPLOY_PATH/scripts/deploy.sh' '$DEPLOY_PHP_BIN'"

  # ───────────────────────────────────────────────────────────────────────────
  # NOTIFY — always runs. Reports overall outcome, including a build-stage failure
  # that would skip the deploy job and otherwise send no notification.
  # ───────────────────────────────────────────────────────────────────────────
  notify:
    needs: [build, deploy]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Notify Kchat
        uses: ./.github/actions/notify-kchat
        with:
          title: ${{ (needs.build.result == 'success' && needs.deploy.result == 'success') && '✅ Deploy successful' || '❌ Deploy failed' }}
          color: ${{ (needs.build.result == 'success' && needs.deploy.result == 'success') && '#36a64f' || '#e01e5a' }}
          sha: ${{ github.event.workflow_run.head_sha }}
          branch: ${{ github.event.workflow_run.head_branch }}
          repo: ${{ github.repository }}
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          commit_url: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.event.workflow_run.head_sha }}
          webhook_url: ${{ secrets.KCHAT_WEBHOOK_URL }}
          context: production
