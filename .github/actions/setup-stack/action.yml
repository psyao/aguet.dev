name: 'Setup PHP and Node'
description: 'Standard environment setup with caching'

runs:
  using: "composite"
  steps:
    - name: Setup PHP
      uses: shivammathur/setup-php@44454db4f0199b8b9685a5d763dc37cbf79108e1 # 2.36.0
      with:
        php-version: '8.5'
        extensions: intl, exif, imagick, bcmath, gd, zip
        tools: composer:v2

    - name: Cache Composer dependencies
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: vendor
        key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
        restore-keys: ${{ runner.os }}-composer-

    - name: Validate composer files
      shell: bash
      run: composer validate --strict   # fail if composer.json / composer.lock drifted

    - name: Install PHP dependencies
      shell: bash
      # --no-scripts during the build also blocks Composer plugin/script execution in
      # the untrusted-code phase. The server's deploy.sh runs the real, scripted install
      # with --optimize-autoloader; vendor/ here is throwaway and is not shipped.
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    - name: Audit PHP dependencies
      shell: bash
      # Fail the build on known CVEs in the locked production dependencies. Scoped to
      # --no-dev so a CVE in dev-only tooling (PHPStan, Pint, etc.) — which never ships
      # to production — doesn't block a deploy. Drop --no-dev to audit dev deps too.
      run: composer audit --no-dev

    - name: Install pnpm
      uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      # No `version:` on purpose — it is read from the "packageManager" field in
      # package.json. Set e.g. "packageManager": "pnpm@11.x.y" so local and CI use
      # the identical pnpm. (Without that field, action-setup requires a version input.)

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '24'
        cache: 'pnpm'   # caches the pnpm STORE keyed on pnpm-lock.yaml — deterministic
                        # (replaces caching node_modules, which is non-deterministic)

    - name: Install JS dependencies
      shell: bash
      # Fail closed: install exactly what is in the committed pnpm-lock.yaml. If this
      # fails, the lockfile is stale — update and commit it locally rather than loosening
      # this, which would let unreviewed (potentially malicious) versions into a prod build.
      run: pnpm install --frozen-lockfile

    - name: Build assets
      shell: bash
      run: pnpm run build
